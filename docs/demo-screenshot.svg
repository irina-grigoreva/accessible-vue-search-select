  <text x="664" y="500" fill="#0F172A" font-family="Arial, sans-serif" font-size="16">role="combobox"</text>
  <text x="664" y="532" fill="#0F172A" font-family="Arial, sans-serif" font-size="16">aria-controls + aria-activedescendant</text>
  <text x="664" y="564" fill="#0F172A" font-family="Arial, sans-serif" font-size="16">role="listbox" and role="option"</text>
